# General.
verbose: true
seed: 42
llms:
  - Meta-Llama-3.1-8B-Instruct  # 8B parameters
  - aya-expanse-32b  # 32B parameters
  - DeepSeek-R1-Distill-Qwen-32B  # 33B parameters
  - Qwen3-32B  # 33B parameters
  - QwQ-32B  # 33B parameters
  - Qwen2.5-72B-Instruct  # 73B parameters
  - Mistral-Large-Instruct-2411  # 123B parameters
  - Mixtral-8x22B-v0.1  # 141B parameters  # use_chat=False for this one, or it blocks indefinitely


# Preprocess.
factual_variant_id: factual
subsampling_per_relation: 200
preprocess_nf_threshold: 5
relation_type: AtLocation

# Inference.
inference_variant_id: factual
prompt_batch_size: 10
checkpoint_frequency: 300.0
chosen_only_logprob: true

# Postprocess and analysis.
collate_variants:  # Make sure a control condition is present AND appears first.
  - factual
  - random
  - controlled
aggregator: SUM
flip_logprobs: true
show_assumption_plots: false
create_violin_plots: false
